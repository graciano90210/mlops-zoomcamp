name: CI - Credit Risk Pipeline

on:
  push:
    paths:
      - 'my-homework/07-project/credit-risk-mlops/**'
  pull_request:
    paths:
      - 'my-homework/07-project/credit-risk-mlops/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-homework/07-project/credit-risk-mlops

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install lifelines scikit-learn pandas fastapi pytest

      - name: Run tests
        run: pytest tests/ -v
